<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TNG CAFE</title>
    <link rel="stylesheet" href="test.css">
  </head>

  <body>
    <header>
      <h1>TNG CAFE</h1>
      <p>心安らぐ一杯をあなたに</p>

      <nav>
        <ul>
          <li><a href="#section1"><strong>About Us</strong></a></li>
          <li><a href="#section2"><strong>Menu</strong></a></li>
          <li><a href="#section3"><strong>Contact</strong></a></li>
        </ul>
      </nav>
    </header>

  <main>
    <section id="section1">
      <h2>About Us</h2>
        <p>TNGCafeは自然の香りに包まれたリラックス空間を提供しています。<br>
        自家焙煎コーヒーと手作りスイーツで、穏やかな時間をお過ごしください。</p>
        <img src="cafe.img" alt="カフェの写真" width="300">
    </section>

    <section id="section2">
      <h2>Menu</h2>

      <div class="menu">
        <div class="menu-card">
          <img src="coffe.img" alt="コーヒー" width="300">
          <p>ブレンドコーヒー</p>
        </div>
      
        <div class="menu-card">
          <img src="cake.img" alt="ケーキ" width="300">
          <p>ベイクドチーズケーキ</p>
        </div>

        <div class="menu-card">
          <img src="latte.img" alt="ラテ" width="300">
          <p>カフェラテ</p>
        </div>
      </div>
    </section>

    <section id="section3" class="contact">
      <h2>Contact</h2>
        <form class="contact-form" action="#" method="post">
        
          <label for="name">お名前：</label><br>
          <input type="text" id="name" name="name"><br>
          
          <label for="email">メールアドレス：</label><br>
          <input type="email" id="email" name="email"><br>
          
          <label for="message">お問い合わせ内容：</label><br>
          <textarea id="message" name="message" rows="5" cols="20">
          </textarea><br>
          
        
          <button type="submit">送信</button>
        </form>
    </section>
  </main>

  <footer>
    <p>&copy; 20○○ TNG Cafe</p>

  </body>
</html>
